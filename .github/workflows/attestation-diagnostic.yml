name: attestation-diagnostic

# Temporary P6 diagnostic. Fixed failed digest, no caller-controlled inputs,
# no write permissions, and no artifact payload values in output.
on:
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Inspect redacted attestation shapes
        env:
          REF: ghcr.io/erikbpf/kindle-dash@sha256:f3fe6c1246fe64d1a5eaa0ca57c028b480d5ec39d044978b5fc8c4f38ab63fcc
        run: |
          set -euo pipefail
          shape='
            def shape:
              if type == "object" then with_entries(.value |= shape)
              elif type == "array" then
                {"__type":"array","length":length,"item_types":(map(type)|unique)}
              else type
              end;
            shape
          '
          provenance=$(docker buildx imagetools inspect "$REF" --format '{{ json .Provenance }}')
          sbom=$(docker buildx imagetools inspect "$REF" --format '{{ json .SBOM }}')
          {
            echo "### Provenance shape"
            echo '```json'
            jq "$shape" <<<"$provenance"
            echo '```'
            echo "### SBOM shape"
            echo '```json'
            jq "$shape" <<<"$sbom"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
