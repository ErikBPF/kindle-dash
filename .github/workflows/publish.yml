name: publish

# Build the renderer image and publish it to GHCR on a version tag.
# Tag a release with `git tag v0.1.0 && git push --tags` to fire this.
# amd64-only: the renderer runs server-side on an amd64 host; the Kindle only
# displays the resulting PNG, so no arm/multi-arch manifest is needed.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive tags + labels
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ghcr.io/erikbpf/kindle-dash
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build + push
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ./renderer
          file: ./renderer/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Record digest
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          {
            echo "### Published"
            echo '```'
            echo "ghcr.io/erikbpf/kindle-dash@${DIGEST}"
            echo '```'
            echo "Mirror to Harbor + pin the consumer with this digest."
          } >> "$GITHUB_STEP_SUMMARY"
