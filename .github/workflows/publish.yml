name: publish

# Publish only a PR merge commit from protected main. Release labels are
# mutually exclusive in tools/release_version.py; no label defaults to minor.
on:
  pull_request:
    branches: [main]
    types: [closed]

permissions:
  contents: write
  id-token: write
  packages: write

concurrency:
  group: publish-main
  cancel-in-progress: false

jobs:
  publish:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.merge_commit_sha }}

      - name: Calculate release
        id: version
        env:
          LABELS: ${{ toJSON(github.event.pull_request.labels.*.name) }}
        run: |
          set -euo pipefail
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os
          import subprocess

          from tools.release_version import next_version

          tags = subprocess.run(
              ["git", "tag", "--list", "v*"],
              check=True,
              capture_output=True,
              text=True,
          ).stdout.splitlines()
          version = next_version(tags, json.loads(os.environ["LABELS"]))
          print(f"publish={'true' if version else 'false'}")
          print(f"version={version or ''}")
          PY

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
        if: steps.version.outputs.publish == 'true'

      - name: Log in to GHCR
        if: steps.version.outputs.publish == 'true'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish immutable image
        id: build
        if: steps.version.outputs.publish == 'true'
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ./renderer
          file: ./renderer/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ghcr.io/erikbpf/kindle-dash:${{ steps.version.outputs.version }}
          labels: |
            org.opencontainers.image.revision=${{ github.event.pull_request.merge_commit_sha }}
            org.opencontainers.image.source=https://github.com/ErikBPF/kindle-dash
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
          provenance: mode=max
          sbom: true

      - name: Install Cosign
        if: steps.version.outputs.publish == 'true'
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign and verify image artifacts
        id: provenance
        if: steps.version.outputs.publish == 'true'
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          IMAGE: ghcr.io/erikbpf/kindle-dash
        run: |
          set -euo pipefail
          ref="${IMAGE}@${DIGEST}"
          identity='https://github.com/ErikBPF/kindle-dash/.github/workflows/publish.yml@refs/heads/main'
          issuer='https://token.actions.githubusercontent.com'
          cosign sign --yes "$ref"
          cosign verify \
            --certificate-identity "$identity" \
            --certificate-oidc-issuer "$issuer" \
            "$ref"
          provenance=$(docker buildx imagetools inspect "$ref" \
            --format '{{ json .Provenance.SLSA }}')
          sbom=$(docker buildx imagetools inspect "$ref" \
            --format '{{ json .SBOM.SPDX }}')
          jq -e '
            type == "object" and
            (.buildDefinition.buildType | type == "string") and
            (.buildDefinition.resolvedDependencies | type == "array") and
            (.runDetails.builder.id | type == "string")
          ' <<<"$provenance" >/dev/null
          jq -e '
            .SPDXID == "SPDXRef-DOCUMENT" and
            (.packages | type == "array")
          ' <<<"$sbom" >/dev/null

      - name: Notify security and incidents channels
        if: always() && steps.version.outputs.publish == 'true' && steps.provenance.outcome == 'failure'
        env:
          INCIDENTS_WEBHOOK: ${{ secrets.DISCORD_INCIDENTS_WEBHOOK }}
          SECURITY_WEBHOOK: ${{ secrets.DISCORD_SECURITY_WEBHOOK }}
        run: |
          payload=$(jq -nc \
            --arg version "${{ steps.version.outputs.version }}" \
            --arg url "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" \
            '{allowed_mentions:{parse:[]},embeds:[{title:"RELEASE PROVENANCE FAILED",description:("Kindle image was not promoted.\n**Version:** `"+$version+"`\nNo signature or scanner output is included.\n[Open workflow]("+$url+")"),color:15548997}]}')
          sent=false
          for webhook in "$SECURITY_WEBHOOK" "$INCIDENTS_WEBHOOK"; do
            [[ -n "$webhook" ]] || continue
            curl -fsS -H "Content-Type: application/json" --data "$payload" "$webhook"
            sent=true
          done
          if [[ "$sent" == false ]]; then
            echo "::notice::Discord security/incident webhooks not configured"
          fi

      - name: Tag verified merge commit
        if: steps.version.outputs.publish == 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.merge_commit_sha }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag --annotate "$VERSION" --message "Release $VERSION"
          git push origin "$VERSION"

      - name: Mint narrow Servarr App token
        id: servarr-app
        if: steps.version.outputs.publish == 'true'
        env:
          APP_ID: ${{ secrets.KINDLE_RELEASE_APP_ID }}
          APP_PRIVATE_KEY: ${{ secrets.KINDLE_RELEASE_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          b64url() {
            openssl base64 -A | tr '+/' '-_' | tr -d '='
          }
          now=$(date +%s)
          header=$(printf '%s' '{"alg":"RS256","typ":"JWT"}' | b64url)
          payload=$(jq -nc \
            --argjson iat "$((now - 60))" \
            --argjson exp "$((now + 540))" \
            --arg iss "$APP_ID" \
            '{iat:$iat,exp:$exp,iss:$iss}' | b64url)
          unsigned="${header}.${payload}"
          signature=$(printf '%s' "$unsigned" |
            openssl dgst -sha256 -sign <(printf '%s' "$APP_PRIVATE_KEY") |
            b64url)
          app_jwt="${unsigned}.${signature}"
          installation_id=$(curl -fsS \
            -H "Authorization: Bearer ${app_jwt}" \
            -H 'Accept: application/vnd.github+json' \
            https://api.github.com/repos/ErikBPF/servarr/installation |
            jq -r .id)
          token=$(curl -fsS -X POST \
            -H "Authorization: Bearer ${app_jwt}" \
            -H 'Accept: application/vnd.github+json' \
            "https://api.github.com/app/installations/${installation_id}/access_tokens" |
            jq -r .token)
          test -n "$token"
          echo "::add-mask::${token}"
          echo "token=${token}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        if: steps.version.outputs.publish == 'true'
        with:
          repository: ErikBPF/servarr
          token: ${{ steps.servarr-app.outputs.token }}
          path: servarr

      - name: Open and merge verified Servarr pin PR
        if: steps.version.outputs.publish == 'true'
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          GH_TOKEN: ${{ steps.servarr-app.outputs.token }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          file=servarr/machines/discovery/kindle-dash.compose.yml
          python tools/update_servarr_pin.py "$file" "$VERSION" "$DIGEST"
          branch="release/kindle-dash-${VERSION}"
          git -C servarr config user.name "erikbpf-kindle-release[bot]"
          git -C servarr config user.email \
            "4341347+erikbpf-kindle-release[bot]@users.noreply.github.com"
          git -C servarr switch -c "$branch"
          git -C servarr add machines/discovery/kindle-dash.compose.yml
          git -C servarr commit -m "chore(kindle): pin ${VERSION}"
          git -C servarr push origin "$branch"
          pr_url=$(gh pr create \
            --repo ErikBPF/servarr \
            --base main \
            --head "$branch" \
            --title "chore(kindle): pin ${VERSION}" \
            --body "Verified release: \`ghcr.io/erikbpf/kindle-dash@${DIGEST}\`")
          pr_number="${pr_url##*/}"
          for attempt in {1..12}; do
            check_count=$(gh pr checks \
              --repo ErikBPF/servarr "$pr_number" --json name \
              --jq length 2>/dev/null || true)
            if [[ "${check_count:-0}" -gt 0 ]]; then
              break
            fi
            if [[ "$attempt" -eq 12 ]]; then
              echo "::error::No checks registered for Servarr PR #${pr_number}"
              exit 1
            fi
            sleep 5
          done
          gh pr checks --repo ErikBPF/servarr "$pr_number" \
            --watch --interval 10
          gh pr merge --repo ErikBPF/servarr "$pr_number" \
            --squash --delete-branch

      - name: Release summary
        if: steps.version.outputs.publish == 'true'
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          {
            echo "### Published and verified"
            echo
            echo "\`ghcr.io/erikbpf/kindle-dash@${DIGEST}\`"
            echo
            echo "Version: \`${VERSION}\`"
          } >> "$GITHUB_STEP_SUMMARY"
